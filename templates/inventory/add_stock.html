{% extends "base.html" %}
{% block title %}Add Stock{% endblock %}
{% block page_title %}Add Stock Item{% endblock %}
{% block content %}
{% include "partials/messages.html" %}
<div style="max-width:560px;margin:0 auto;">
<div class="card">
  <div class="card-header"><span class="card-title">New Inventory Item</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="grid grid-2 gap-4">
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Item Name *</label>
          <input type="text" name="item_name" class="form-control" required placeholder="e.g. Rice">
        </div>
        <div class="form-group">
          <label class="form-label">Quantity *</label>
          <input type="number" name="quantity" class="form-control" step="0.01" min="0" placeholder="25">
        </div>
        <div class="form-group">
          <label class="form-label">Unit</label>
          <input type="text" name="unit" class="form-control" placeholder="kg / litre / pcs" list="unit_list">
          <datalist id="unit_list"><option value="kg"><option value="g"><option value="litre"><option value="ml"><option value="pcs"><option value="dozen"></datalist>
        </div>
        <div class="form-group">
          <label class="form-label">Cost per Unit (INR)</label>
          <input type="number" name="cost_per_unit" class="form-control" step="0.01" min="0" placeholder="45">
        </div>
        <div class="form-group">
          <label class="form-label">Reorder Level</label>
          <input type="number" name="reorder_level" class="form-control" step="0.01" min="0" placeholder="5">
        </div>
        <div class="form-group">
          <label class="form-label">Expiry Date <span class="text-subtle">(optional)</span></label>
          <input type="date" name="expiry_date" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <input type="text" name="category" class="form-control" placeholder="e.g. Grains">
        </div>
        <div class="form-group">
          <label class="form-label">Supplier</label>
          <input type="text" name="supplier" class="form-control" placeholder="e.g. ABC Traders">
        </div>
      </div>
      <div class="flex gap-3 mt-4">
        <button type="submit" class="btn btn-primary">Add to Inventory</button>
        <a href="{% url 'inventory:index' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
