{% extends "base.html" %}
{% block title %}Edit Stock — {{ item.item_name }}{% endblock %}
{% block page_title %}Edit: {{ item.item_name }}{% endblock %}
{% block content %}
{% include "partials/messages.html" %}
<div style="max-width:560px;margin:0 auto;">
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="grid grid-2 gap-4">
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Item Name</label>
          <input type="text" name="item_name" class="form-control" value="{{ item.item_name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input type="number" name="quantity" class="form-control" step="0.01" value="{{ item.quantity|default:0 }}">
        </div>
        <div class="form-group">
          <label class="form-label">Unit</label>
          <input type="text" name="unit" class="form-control" value="{{ item.unit|default:'' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Cost per Unit (INR)</label>
          <input type="number" name="cost_per_unit" class="form-control" step="0.01" value="{{ item.cost_per_unit|default:0 }}">
        </div>
        <div class="form-group">
          <label class="form-label">Reorder Level</label>
          <input type="number" name="reorder_level" class="form-control" step="0.01" value="{{ item.reorder_level|default:0 }}">
        </div>
        <div class="form-group">
          <label class="form-label">Expiry Date</label>
          <input type="date" name="expiry_date" class="form-control" value="{{ item.expiry_date|default:'' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <input type="text" name="category" class="form-control" value="{{ item.category|default:'' }}">
        </div>
      </div>
      <div class="flex gap-3 mt-4">
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'inventory:index' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
