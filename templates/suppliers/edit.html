{% extends "base.html" %}
{% block title %}Edit Supplier{% endblock %}
{% block page_title %}Edit Supplier{% endblock %}
{% block content %}
{% include "partials/messages.html" %}
<div style="max-width:480px;margin:0 auto;">
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label class="form-label">Supplier Name *</label><input type="text" name="name" class="form-control" value="{{ supplier.name }}" required></div>
      <div class="form-group"><label class="form-label">Contact Person</label><input type="text" name="contact_person" class="form-control" value="{{ supplier.contact_person }}"></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" name="phone" class="form-control" value="{{ supplier.phone }}"></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ supplier.email }}"></div>
      <div class="form-group"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ supplier.address }}</textarea></div>
      <div class="form-group"><label class="form-label">Products Supplied</label><input type="text" name="products" class="form-control" value="{{ supplier.products }}" placeholder="e.g. Rice, Wheat, Spices"></div>
      <div class="form-group"><label class="form-label">Payment Terms</label><input type="text" name="payment_terms" class="form-control" value="{{ supplier.payment_terms }}" placeholder="e.g. Net 30, Cash on delivery"></div>
      <div class="flex gap-3"><button type="submit" class="btn btn-primary">Save Changes</button><a href="{% url 'suppliers:index' %}" class="btn btn-outline">Cancel</a></div>
    </form>
  </div>
</div>
</div>
{% endblock %}
